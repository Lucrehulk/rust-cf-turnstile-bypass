<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Turnstile iframe Solver</title>
        <style>
            #__ts_container__ {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 9999;
            }
        </style>
        <script type="module" crossorigin src="/index.js"></script>
    </head>
    <body>
        <script>
            (function () {
                function auto_reset(widget_id) {
                    try { window.turnstile.reset(widget_id); } catch (e) {}
                }

                function patch_turnstile() {
                    let ts = window.turnstile;
                    if (!ts || typeof ts.render != 'function') return;
                    let orig_render = ts.render.bind(ts);
                    ts.render = function (container, params) {
                        let p = params ? Object.assign({}, params) : {};

                        let orig_expired = typeof p['expired-callback'] == 'function' ? p['expired-callback'] : null;
                        p['expired-callback'] = function (widget_id) {
                            if (orig_expired) orig_expired(widget_id);
                            auto_reset(widget_id);
                        };

                        let orig_error = typeof p['error-callback'] == 'function' ? p['error-callback'] : null;
                        p['error-callback'] = function (code) {
                            if (orig_error) orig_error(code);
                            let saved_container = container;
                            setTimeout(function () { auto_reset(saved_container); }, 2000);
                        };

                        return orig_render(container, p);
                    };
                }

                let prev_on_load = window.cf__reactTurnstileOnLoad;
                window.cf__reactTurnstileOnLoad = function () {
                    patch_turnstile();
                    if (typeof prev_on_load == 'function') prev_on_load();
                };
            })();
        </script>
        <script
            src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=cf__reactTurnstileOnLoad"
            async
            defer="defer"
        ></script>
    </body>
</html>
