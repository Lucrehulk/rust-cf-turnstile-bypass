<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Token Harvester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: black;
        }
        #iframe-farm {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        #iframe-farm iframe {
            position: absolute;
            border: 1px solid #333;
            background: black;
        }
    </style>
</head>
<body>
    <div id="iframe-farm"></div>
    <script>
        (async () => {
            // Set your token server host.
            const TOKEN_SERVER_HOST = "ws://localhost:8080";
            
            // Number of iframes to load on startup.
            // Set to 1 if you have a system to rotate a proxy on window reloads,
            // in which case after each token send the window will reload for you so it can rotate.
            const PRELOAD_IFRAMES = 1;

            // Set your sitekey. Initially was a set const here but changed it into a localStorage value.
            const SITEKEY = localStorage.sitekey;

            // Timeout for proxy to connect, in ms.
            const PROXY_CONNECT_TIMEOUT = 5000;

            // Boolean for if you want to use the multi-proxy system for solving.
            const USE_PROXY_SOLVING = true;

            window.token_server_host = TOKEN_SERVER_HOST;
            window.preload_iframes = PRELOAD_IFRAMES;
            window.sitekey = SITEKEY;

            let proxies = localStorage.proxies.split(/\r?\n/).map(p => p.trim()).filter(Boolean);
            let user_agents = localStorage.user_agents.split(/\r?\n/).map(p => p.trim()).filter(Boolean);

            async function connect_to_proxy() {
                let proxy = proxies[window.solver_idx];
                let user_agent = undefined;

                if (user_agents.length != 0) user_agent = user_agents[window.solver_idx % user_agents.length];

                console.log(`Requesting extension to bind tab to proxy: ${proxy}`);

                return new Promise((resolve, reject) => {
                    // Set a timeout to reload the page if connection fails. This way we move onto the next solver proxy.
                    let timeout_id = setTimeout(() => {
                        console.error("Proxy connection timed out after 5 seconds. Reloading...");
                        let pkt = new Uint8Array(5);
                        pkt[0] = 0;
                        pkt[1] = window.requester_id & 255;
                        pkt[2] = (window.requester_id >> 8) & 255;
                        pkt[3] = (window.requester_id >> 16) & 255;
                        pkt[4] = (window.requester_id >> 24) & 255;
                        window.token_server_socket.send(pkt);
                    }, PROXY_CONNECT_TIMEOUT);

                    let proxy_listener = function(event) {
                        if (event.source != window || !event.data) return;
                        
                        if (event.data.type == "PROXY_READY") {
                            clearTimeout(timeout_id);
                            
                            window.removeEventListener("message", proxy_listener);
                            console.log("Extension confirmed: Proxy is live for this window.");
                            resolve();
                        }
                    };
                    
                    window.addEventListener("message", proxy_listener);

                    window.postMessage({
                        type: "SET_TAB_PROXY",
                        proxy_details: proxy,
                        user_agent: user_agent
                    }, "*");
                });
            }

            document.addEventListener("keydown", async function (e) {
                if (e.code == "KeyK") {
                    let pkt = new Uint8Array(5);
                    pkt[0] = 0;
                    pkt[1] = window.requester_id & 255;
                    pkt[2] = (window.requester_id >> 8) & 255;
                    pkt[3] = (window.requester_id >> 16) & 255;
                    pkt[4] = (window.requester_id >> 24) & 255;
                    window.token_server_socket.send(pkt);
                    location.reload();
                }
            });

            window.token_server_socket = new WebSocket(TOKEN_SERVER_HOST);
            token_server_socket.binaryType = "arraybuffer";

            token_server_socket.onopen = function () {
                token_server_socket.send(new Uint8Array([2]));
            };

            token_server_socket.onmessage = async function (e) {
                document.querySelectorAll('iframe').forEach(iframe => iframe.remove());
                let packet = new DataView(e.data);
                let packet_u8 = new Uint8Array(e.data);
                window.solver_idx = packet.getUint32(0, true);
                window.requester_id = packet.getUint32(4, true);
                window.extra_cf_turnstile_render_fields = {};
                let ptr = 8;
                let decoder = new TextDecoder();
                while (ptr < packet_u8.length) {
                    let field_name_length = packet_u8[ptr++];
                    let field_name = decoder.decode(packet_u8.slice(ptr, ptr + field_name_length));
                    ptr = ptr + field_name_length;
                    let field_value_length = packet_u8[ptr++];
                    let field_value = decoder.decode(packet_u8.slice(ptr, ptr + field_value_length));
                    ptr = ptr + field_value_length;
                    window.extra_cf_turnstile_render_fields[field_name] = field_value;
                };
                console.log("Solver idx: " + window.solver_idx);
                console.log("Requester id: " + window.requester_id);
                console.log("Extra render call fields: ", window.extra_cf_turnstile_render_fields);
                if (USE_PROXY_SOLVING) await connect_to_proxy();
                start_solvers();
            };

            let start_solvers = function () {
                let farm = document.getElementById('iframe-farm');
                let count = 0;

                function layout() {
                    let frames = farm.querySelectorAll('iframe');
                    let n = frames.length;
                    if (n == 0) return;

                    let cols = Math.ceil(Math.sqrt(n));
                    let rows = Math.ceil(n / cols);
                    let w = Math.floor(window.innerWidth / cols);
                    let h = Math.floor(window.innerHeight / rows);

                    frames.forEach(function (f, i) {
                        f.style.left = ((i % cols) * w) + 'px';
                        f.style.top = (Math.floor(i / cols) * h) + 'px';
                        f.style.width = w + 'px';
                        f.style.height = h + 'px';
                    });
                }

                function spawn_iframe() {
                    count++;
                    let f = document.createElement('iframe');
                    f.srcdoc = `<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Turnstile iframe Solver</title>
        <style>
            #__ts_container__ {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 9999;
            }
        </style>
        <script type="module">
            (function () {
                'use strict';

                let start_time = Date.now();
                globalThis.run_time = function () {
                    return ((Date.now() - start_time) / 1000).toFixed(3) + 's';
                };

                try { localStorage.removeItem('cached_captcha_token'); } catch (e) {}

                let resolvers = [];
                let token = null;
                let retry_timeout = null;
                let retry_count = 0;
                let max_retries = 10;
                let retry_delay_ms = 2000;

                Object.defineProperty(window, 'captcha_token', {
                    configurable: true,
                    get: function () { return token; },
                    set: async function (v) {
                        token = v;
                        console.log("Token: " + v);
                        retry_count = 0;
                        console.log('[turnstile] token:', v, '| time:', run_time());
                        resolvers.forEach(function (r) { r(v); });
                        resolvers = [];
                        let bytes = new TextEncoder().encode(v);
                        let pkt = new Uint8Array(bytes.length + 9);
                        // Send the token packet to the token server.
                        pkt[0] = 0;
                        pkt[1] = window.top.requester_id & 255;
                        pkt[2] = (window.top.requester_id >> 8) & 255;
                        pkt[3] = (window.top.requester_id >> 16) & 255;
                        pkt[4] = (window.top.requester_id >> 24) & 255;
                        pkt[5] = window.top.solver_idx & 255;
                        pkt[6] = (window.top.solver_idx >> 8) & 255;
                        pkt[7] = (window.top.solver_idx >> 16) & 255;
                        pkt[8] = (window.top.solver_idx >> 24) & 255;
                        pkt.set(bytes, 9);
                        window.top.token_server_socket.send(pkt);
                    }
                });

                window.get_turnstile_token = function () {
                    if (token) return Promise.resolve(token);
                    return new Promise(function (r) { resolvers.push(r); });
                };

                window.reset_turnstile = function () {
                    token = null;
                    if (retry_timeout) { clearTimeout(retry_timeout); retry_timeout = null; }
                    try { localStorage.removeItem('cached_captcha_token'); } catch (e) {}
                    if (window.turnstile) { try { window.turnstile.reset(); } catch (e) {} }
                };

                function schedule_retry(reason) {
                    if (retry_count >= max_retries) {
                        console.warn('[turnstile] max retries reached, giving up');
                        return;
                    }
                    retry_count++;
                    let delay = retry_delay_ms * retry_count;
                    console.log('[turnstile] ' + reason + ' — retry ' + retry_count + '/' + max_retries + ' in ' + delay + 'ms');
                    if (retry_timeout) clearTimeout(retry_timeout);
                    retry_timeout = setTimeout(function () {
                        retry_timeout = null;
                        console.log('[turnstile] retrying render...');
                        window.reset_turnstile();
                        window.cf__reactTurnstileOnLoad();
                    }, delay);
                }

                window.cf__reactTurnstileOnLoad = function () {
                    let container = document.getElementById('__ts_container__');
                    if (!container) {
                        container = document.createElement('div');
                        container.id = '__ts_container__';
                        container.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;';
                        document.body.appendChild(container);
                    }

                    container.innerHTML = '';

                    let cf_turnstile_render_fields = {
                        sitekey: window.top.sitekey,
                        appearance: 'always',
                        callback: function (t) {
                            window.captcha_token = t;
                            try { localStorage.setItem('cached_captcha_token', t); } catch (e) {}
                        },
                        'error-callback': function (code) {
                            console.log('[turnstile] error:', code);
                            let pkt = new Uint8Array(5);
                            pkt[0] = 0;
                            pkt[1] = window.top.requester_id & 255;
                            pkt[2] = (window.top.requester_id >> 8) & 255;
                            pkt[3] = (window.top.requester_id >> 16) & 255;
                            pkt[4] = (window.top.requester_id >> 24) & 255;
                            window.top.token_server_socket.send(pkt);
                        },
                        'expired-callback': function () {
                            let pkt = new Uint8Array(5);
                            pkt[0] = 0;
                            pkt[1] = window.top.requester_id & 255;
                            pkt[2] = (window.top.requester_id >> 8) & 255;
                            pkt[3] = (window.top.requester_id >> 16) & 255;
                            pkt[4] = (window.top.requester_id >> 24) & 255;
                            window.top.token_server_socket.send(pkt);
                        }
                    };

                    for (let field in window.top.extra_cf_turnstile_render_fields) {
                        cf_turnstile_render_fields[field] = window.top.extra_cf_turnstile_render_fields[field];
                    };

                    window.turnstile.render(container, cf_turnstile_render_fields);
                };
            })();
        <\/script>
    </head>
    <body>
        <script>
            (function () {
                function auto_reset(widget_id) {
                    try { window.turnstile.reset(widget_id); } catch (e) {}
                }

                function patch_turnstile() {
                    let ts = window.turnstile;
                    if (!ts || typeof ts.render != 'function') return;
                    let orig_render = ts.render.bind(ts);
                    ts.render = function (container, params) {
                        let p = params ? Object.assign({}, params) : {};

                        let orig_expired = typeof p['expired-callback'] == 'function' ? p['expired-callback'] : null;
                        p['expired-callback'] = function (widget_id) {
                            if (orig_expired) orig_expired(widget_id);
                            auto_reset(widget_id);
                        };

                        let orig_error = typeof p['error-callback'] == 'function' ? p['error-callback'] : null;
                        p['error-callback'] = function (code) {
                            if (orig_error) orig_error(code);
                            let saved_container = container;
                            setTimeout(function () { auto_reset(saved_container); }, 2000);
                        };

                        return orig_render(container, p);
                    };
                }

                let prev_on_load = window.cf__reactTurnstileOnLoad;
                window.cf__reactTurnstileOnLoad = function () {
                    patch_turnstile();
                    if (typeof prev_on_load == 'function') prev_on_load();
                };
            })();
        <\/script>
        <script
            src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=cf__reactTurnstileOnLoad"
            async
            defer="defer"
        ><\/script>
    </body>
</html>`;
                    f.title = 'Instance ' + count;
                    farm.appendChild(f);
                    layout();
                    setTimeout(layout, 0);
                    console.log('[farm] spawned iframe #' + count);
                }

                for (let i = 0; i < PRELOAD_IFRAMES; i += 1) spawn_iframe();

                window.addEventListener('resize', layout);
            }
        })();
    </script>
</body>
</html>
